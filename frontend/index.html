<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonicID — AI Music Analyzer</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app">
  <header class="header">
    <div class="logo">
      <span class="logo-icon">🎵</span>
      <h1>SonicID</h1>
    </div>
    <p class="tagline">AI-анализатор музыки — жанр, настроение, BPM, тональность</p>
  </header>

  <main class="main">
    <!-- Upload zone -->
    <div class="upload-zone" id="uploadZone">
      <div class="upload-content">
        <div class="upload-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <p class="upload-text">Перетащите аудиофайл сюда</p>
        <p class="upload-sub">или нажмите для выбора</p>
        <p class="upload-formats">MP3, WAV, FLAC, OGG, AAC, M4A, OPUS — до 100 MB</p>
      </div>
      <input type="file" id="fileInput" accept=".mp3,.wav,.flac,.ogg,.aac,.m4a,.opus,.wma,.aiff" hidden>
    </div>

    <!-- Progress -->
    <div class="progress-section hidden" id="progressSection">
      <div class="file-info" id="fileInfo"></div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <p class="progress-text" id="progressText">Загрузка...</p>
    </div>

    <!-- Results -->
    <div class="results hidden" id="results">
      <!-- Genre -->
      <section class="card" id="genreCard">
        <h2 class="card-title">🎸 Жанр</h2>
        <div class="genre-main" id="genreMain"></div>
        <div class="genre-bars" id="genreBars"></div>
        <div class="sub-genres" id="subGenres"></div>
      </section>

      <!-- Mood -->
      <section class="card" id="moodCard">
        <h2 class="card-title">😊 Настроение</h2>
        <div class="mood-grid" id="moodGrid"></div>
      </section>

      <!-- Rhythm -->
      <section class="card" id="rhythmCard">
        <h2 class="card-title">🥁 Ритм и тональность</h2>
        <div class="rhythm-grid" id="rhythmGrid"></div>
      </section>

      <!-- Characteristics -->
      <section class="card" id="charCard">
        <h2 class="card-title">📊 Характеристики</h2>
        <div class="char-grid" id="charGrid"></div>
      </section>

      <button class="btn-reset" id="btnReset">Анализировать другой файл</button>
    </div>
  </main>

  <footer class="footer">
    <p>SonicID — <a href="https://gornich.fun" target="_blank">gornich.fun</a></p>
  </footer>
</div>
<script src="/js/app.js"></script>
</body>
</html>
